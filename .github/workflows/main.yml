name: Build iOS IPA (pnpm version)
on: [push]

# This silences the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Adding --no-frozen-lockfile forces it to bypass the mismatch error
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Web App
        run: pnpm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build Unsigned IPA
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -archivePath App.xcarchive archive \
                     CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-ipa
          path: App.ipa
