kind = "mobile"
previewPath = "/mobile/"
title = "Pomopink Mobile"
version = "1.0.0"
id = "artifacts/pomodoro-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22599

[services.development]
run = "pnpm --filter @workspace/pomodoro-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pomodoro-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pomodoro-mobile", "run", "serve" ]

[services.env]
PORT = "22599"
BASE_PATH = "/mobile/"
